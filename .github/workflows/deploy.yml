name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --verbose
        continue-on-error: false

      - name: Verify workspace structure
        run: |
          echo "Checking workspace structure..."
          test -d apps/alien-invasion || { echo "ERROR: apps/alien-invasion not found"; exit 1; }
          test -d apps/fruit-escape || { echo "ERROR: apps/fruit-escape not found"; exit 1; }
          test -d apps/habitat-rescue || { echo "ERROR: apps/habitat-rescue not found"; exit 1; }
          echo "✓ All app directories present"

      - name: Check for required files
        run: |
          echo "Checking root files..."
          test -f index.html || { echo "ERROR: index.html not found"; exit 1; }
          test -f CNAME || { echo "ERROR: CNAME not found"; exit 1; }
          test -f scripts/collect-dist.mjs || { echo "ERROR: collect-dist.mjs not found"; exit 1; }
          echo "✓ All required root files present"

      - name: Build all apps
        run: npm run build:all
        continue-on-error: false

      - name: Verify build artifacts
        run: |
          echo "Verifying build artifacts..."
          test -d dist || { echo "ERROR: dist/ directory not created"; exit 1; }
          test -d dist/alien-invasion || { echo "ERROR: dist/alien-invasion/ not found"; exit 1; }
          test -d dist/fruit-escape || { echo "ERROR: dist/fruit-escape/ not found"; exit 1; }
          test -d dist/habitat-rescue || { echo "ERROR: dist/habitat-rescue/ not found"; exit 1; }
          echo "✓ All build artifacts verified"
          echo ""
          echo "Build artifact sizes:"
          du -sh dist/*/

      - name: Copy portal and config files
        run: |
          echo "Copying portal files..."
          cp index.html dist/index.html || { echo "ERROR: Failed to copy index.html"; exit 1; }
          cp CNAME dist/CNAME || { echo "ERROR: Failed to copy CNAME"; exit 1; }
          echo "✓ Portal files copied"

      - name: Copy screenshot assets
        run: |
          echo "Copying screenshot assets..."
          test -f alien-invasion.png && cp alien-invasion.png dist/alien-invasion.png
          test -f fruit-escape.png && cp fruit-escape.png dist/fruit-escape.png
          test -f habitat-rescue.png && cp habitat-rescue.png dist/habitat-rescue.png
          echo "✓ Screenshot assets copied"

      - name: Verify dist directory structure
        run: |
          echo "Final dist/ structure:"
          find dist -maxdepth 2 -type f | head -20
          echo ""
          echo "Total files in dist/:"
          find dist -type f | wc -l

      - name: Check for build warnings
        run: |
          if [ -f dist/index.html ]; then
            echo "✓ Portal HTML generated"
            # Basic validation: check for critical tags
            grep -q "<title>" dist/index.html || echo "WARNING: No <title> tag in index.html"
            grep -q "games" dist/index.html || echo "WARNING: No 'games' reference in index.html"
          fi

      - name: Upload artifacts to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Post-deployment verification
        run: |
          echo "Deployment URL: ${{ steps.deployment.outputs.page_url }}"
          echo "Verifying deployment (this may take a moment)..."

          # Wait a few seconds for DNS propagation
          sleep 5

          # Check if pages are accessible
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deployment.outputs.page_url }}")
          if [ "$STATUS" = "200" ]; then
            echo "✓ Portal page accessible (HTTP $STATUS)"
          else
            echo "⚠ Portal returned HTTP $STATUS"
          fi

          # Check individual game routes (with fallback for initial deployment)
          for game in alien-invasion fruit-escape habitat-rescue; do
            GAME_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deployment.outputs.page_url }}$game/" || echo "000")
            if [ "$GAME_STATUS" = "200" ]; then
              echo "✓ /$game/ accessible"
            else
              echo "⚠ /$game/ returned HTTP $GAME_STATUS (may be expected on first deploy)"
            fi
          done

          echo ""
          echo "✓ Deployment complete!"
          echo "Visit: ${{ steps.deployment.outputs.page_url }}"
